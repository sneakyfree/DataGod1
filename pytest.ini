[pytest]
testpaths = tests datagod/tests api/src
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
    --strict-markers
    --cov=datagod
    --cov=api
    --cov=db_manager
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --cov-report=xml:coverage.xml
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::ResourceWarning
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    unit: marks tests as unit tests
    scraper: marks tests for scraper functionality
    validation: marks tests for validation framework
    entity_linking: marks tests for entity linking
env =
    TESTING=1
    DATABASE_URL=sqlite:///:memory:

[coverage:run]
branch = true
source = datagod,api,db_manager
omit =
    */tests/*
    */__init__.py
    */migrations/*
    */.venv/*
    */venv/*
    */site-packages/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
    pass
fail_under = 80
show_missing = true
precision = 2

[coverage:html]
directory = htmlcov
title = DataGod Coverage Report

[coverage:xml]
output = coverage.xml
