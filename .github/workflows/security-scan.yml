name: Security Scan

on:
  push:
    branches: [ main, development, master ]
  schedule:
    - cron: '0 0 * * 0'  # Weekly on Sunday

env:
  PYTHON_VERSION: '3.11'

jobs:
  security:
    name: Security Analysis
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Cache pip dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-security-${{ hashFiles('**/requirements.txt') }}

    - name: Install security tools
      run: |
        python -m pip install --upgrade pip
        pip install bandit safety

    - name: Run Bandit security linter
      run: |
        bandit -r datagod -ll -ii --format json --output bandit-report.json || true
        bandit -r datagod -ll -ii --format txt

    - name: Run Safety dependency check
      run: |
        safety check --json --output safety-report.json || true
        safety check

    - name: Upload security reports
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: security-reports
        path: |
          bandit-report.json
          safety-report.json

    - name: Check for critical vulnerabilities
      run: |
        # Parse Bandit report for critical issues
        if grep -q '"severity": "HIGH"' bandit-report.json; then
          echo "::error::High severity security issues found in Bandit scan"
          exit 1
        fi

        # Parse Safety report for critical vulnerabilities
        if grep -q '"severity": "high"' safety-report.json; then
          echo "::error::High severity vulnerabilities found in Safety scan"
          exit 1
        fi

        echo "No critical security issues found"

  snyk-scan:
    name: Snyk Security Scan
    runs-on: ubuntu-latest
    continue-on-error: true  # Don't fail the workflow if Snyk is not configured

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Snyk security scan
      uses: snyk/actions/python@master
      env:
        SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      with:
        args: --json-file-output=snyk-report.json

    - name: Upload Snyk report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: snyk-report
        path: snyk-report.json

  notify:
    name: Security Notification
    runs-on: ubuntu-latest
    needs: [security, snyk-scan]
    if: always()

    steps:
    - name: Check security scan results
      run: |
        echo "Security scan completed"
        echo "Status: ${{ needs.security.result }}"

        if [ "${{ needs.security.result }}" == "failure" ]; then
          echo "::error::Security scan failed - critical vulnerabilities detected"
          exit 1
        fi

        echo "All security checks passed successfully"

    - name: Notify team
      if: always()
      run: |
        echo "Security scan completed for commit ${{ github.sha }}"
        echo "Branch: ${{ github.ref }}"
        echo "Status: ${{ job.status }}"
        echo "View results: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"