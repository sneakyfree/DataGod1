services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: datagod-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-datagod}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-datagod_secure_password}
      POSTGRES_DB: ${POSTGRES_DB:-datagod}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-datagod}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - datagod-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: datagod-redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_secure_password}
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_secure_password}", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - datagod-network

  # DataGod API Backend
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: datagod-api
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-datagod}:${POSTGRES_PASSWORD:-datagod_secure_password}@db:5432/${POSTGRES_DB:-datagod}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-redis_secure_password}
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-change-in-production}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-your-jwt-secret-key-change-in-production}
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000,http://localhost:3001}
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
    restart: unless-stopped
    networks:
      - datagod-network

  # DataGod Frontend
  frontend:
    build:
      context: ./frontend/datagod-frontend
      dockerfile: Dockerfile
    container_name: datagod-frontend
    environment:
      - NEXT_PUBLIC_API_URL=http://api:8000/api/v2
      - NODE_ENV=${NODE_ENV:-production}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - datagod-network

  # Celery Worker for background tasks
  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: datagod-worker
    command: celery -A datagod.tasks worker --loglevel=info --concurrency=4
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-datagod}:${POSTGRES_PASSWORD:-datagod_secure_password}@db:5432/${POSTGRES_DB:-datagod}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-redis_secure_password}
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD:-redis_secure_password}@redis:6379/0
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD:-redis_secure_password}@redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
    restart: unless-stopped
    networks:
      - datagod-network

  # Celery Beat for scheduled tasks
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: datagod-scheduler
    command: celery -A datagod.tasks beat --loglevel=info
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-datagod}:${POSTGRES_PASSWORD:-datagod_secure_password}@db:5432/${POSTGRES_DB:-datagod}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-redis_secure_password}
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD:-redis_secure_password}@redis:6379/0
    depends_on:
      - worker
    restart: unless-stopped
    networks:
      - datagod-network

  # Nginx Reverse Proxy (optional for production)
  nginx:
    image: nginx:alpine
    container_name: datagod-nginx
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
      - frontend
    restart: unless-stopped
    networks:
      - datagod-network
    profiles:
      - production

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  datagod-network:
    driver: bridge
